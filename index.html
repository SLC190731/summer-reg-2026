<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026年 多元智能暑期課程報名系統</title>
    <style>
        :root { --cream-bg: #FFFDF0; --soft-brown: #5D4037; --accent-blue: #4A6D8C; --border-color: #E0D8C0; --base-font-size: 18px; --light-panel-bg: #FDFBF7; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--cream-bg); padding: 15px; color: var(--soft-brown); user-select: none; font-size: var(--base-font-size); line-height: 1.4; }
        .container { max-width: 98%; margin: auto; background: #FFFFFF; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(93, 64, 55, 0.08); }
        .page { display: none; }
        .page.active { display: block; }
        .section { margin-bottom: 15px; padding: 20px; border: 1px solid var(--border-color); border-radius: 12px; background: #FFFBF5; }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--accent-blue); padding-bottom: 15px; margin-bottom: 20px; }
        .logo-area img { height: 80px; width: auto; object-fit: contain; }
        .logo-area h1 { font-size: 1.8em; margin: 0; color: var(--accent-blue); }
        .info-area { text-align: right; font-size: 0.85em; color: #795548; line-height: 1.6; }
        .info-area .company-cn { color: var(--accent-blue); font-size: 1.4em; font-weight: bold; display: block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .day { padding: 8px; border: 1px solid #D7CCC8; text-align: center; cursor: pointer; border-radius: 8px; background: #FFFFFF; min-height: 80px; display: flex; flex-direction: column; justify-content: center; transition: 0.2s; }
        .day.selected { background: var(--accent-blue) !important; color: white !important; font-weight: bold; }
        .day.oxford { border: 2px solid #D4A373; background: #FEFAE0; color: #BC6C25; }
        .day.holiday { background: #F8EDEB; color: #E5989B; cursor: not-allowed; opacity: 0.6; }
        .readonly-cal .day { cursor: default; }
        .readonly-cal .day:not(.selected) { opacity: 0.15; background: #f9f9f9; border: 1px solid #eee; }
        .readonly-cal .day.selected { border: 2px solid #333; }
        .result-box { background: #F0F4F0; padding: 20px; border-radius: 12px; border-left: 10px solid #8FA998; }
        .btn { background: var(--accent-blue); color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%; margin-top: 15px; }
        input, select { padding: 12px; width: 100%; margin-top: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1em; }
        #adminPanel { background: var(--light-panel-bg); padding: 25px; border-radius: 12px; border: 2px solid var(--border-color); margin-top: 50px; display: none; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; background: #FFFFFF; }
        .admin-table th, .admin-table td { border: 1px solid var(--border-color); padding: 8px; text-align: center; }
        .stat-badge { padding: 8px 12px; border-radius: 5px; font-weight: bold; font-size: 0.9em; min-width: 110px; text-align: center; color: white; display: inline-block; margin: 5px; }
        #dailyListModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; }
        .modal-content { background: #fff; width: 95%; max-width: 1200px; margin: 1% auto; padding: 20px; height: 95vh; overflow-y: auto; border-radius: 15px; }
        .student-name-tag { display: block; background: #E1F5FE; color: #01579B; margin-bottom: 2px; padding: 4px 6px; border-radius: 3px; border-left: 3px solid #0288D1; font-weight: bold; line-height: 1.2; text-align: left; font-size: 12px; }
        .tag-subject { color: #E65100; font-size: 11px; display: block; border-top: 1px dashed #B3E5FC; margin-top: 2px; padding-top: 2px; }
        .sync-loader { color: #e67e22; font-weight: bold; animation: blink 1s infinite; margin-bottom: 10px; }
        @keyframes blink { 50% { opacity: 0.3; } }
        @media print {
            @page { margin: 0.3cm; size: A4; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .no-print, .btn, #adminToggle { display: none !important; }
            .page, #adminPanel { display: none !important; }
            body.print-mode-parent #page3 { display: block !important; transform: scale(0.72); transform-origin: top center; width: 100%; }
            body.print-mode-admin #adminPanel { display: block !important; transform: scale(0.9); transform-origin: top center; }
            body.print-mode-daily #dailyListModal { display: block !important; position: static; background: white; width: 100%; }
            body.print-mode-daily .modal-content { width: 100%; height: auto; margin: 0; padding: 0; box-shadow: none; transform: scale(0.9); transform-origin: top center; }
            .daily-cal-grid { grid-template-columns: repeat(5, 1fr) !important; }
        }
    </style>
</head>
<body onmouseup="isDragging = false;">

<div class="container">
    <div class="header no-print">
        <div class="logo-area">
            <img src="https://drive.google.com/thumbnail?id=1Rmim28665Iqws7i6jcY3KLnb5VX1hfRI&sz=w1000" alt="Logo">
            <h1>暑期課程報名系統</h1>
        </div>
        <div class="info-area">
            <span class="company-cn">博學堂</span>
            地址：將軍澳毓雅里9號慧安商場1樓慧星滙S39號舖<br>
            電話：2994 8664 / 7071 2040
        </div>
    </div>

    <div id="page1" class="page active">
        <h2>學生資料及方案</h2>
        <div class="section">
            <input type="text" id="stuName" placeholder="學生中文全名">
            <select id="stuGender"><option value="男">男</option><option value="女">女</option></select>
            <select id="stuGrade" onchange="updateEstimates()">
                <option value="p1">升小一</option><option value="p2">升小二</option><option value="p3">升小三</option>
                <option value="p4">升小四</option><option value="p5">升小五</option><option value="p6">升小六</option>
                <option value="secondary">升中一或以上</option>
            </select>
        </div>
        <div class="section">
            <h3>方案選擇</h3>
            <label>Part A (1.5小時/堂)</label>
            <select id="planA" onchange="updateEstimates()">
                <option value="0">不參加</option>
                <option value="12">12 堂</option>
                <option value="16">16 堂</option>
                <option id="optMaxA" value="18">18 堂</option>
            </select>
            <label>Part B (3小時/堂)</label>
            <select id="planB" onchange="updateEstimates()"><option value="0">不參加</option><option value="20">20 堂</option><option value="24">24 堂</option><option value="29">29 堂</option></select>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">
            <label style="display: flex; align-items: center; cursor: pointer; font-weight: bold;">
                <input type="checkbox" id="planC" onchange="updateEstimates()" style="width:20px; height:20px; margin-right: 10px;"> 參加 Part C 成長之旅
            </label>
            <div id="partCDateHint" class="part-c-notice" style="display:none; background:#FEFAE0; color:#BC6C25; padding:10px; border-radius:8px; text-align:center; font-weight:bold; border:2px dashed #D4A373;"></div>
        </div>
        <div class="result-box">
            <p id="estDetail">A: $0 | B: $0 | C: $0</p>
            <p><strong>總額：$<span id="estTotal">0</span></strong> | <strong>分期：$<span id="estInstallment">0</span></strong></p>
        </div>
        <button class="btn" onclick="goToStep2()">下一步：選擇日期</button>
    </div>

    <div id="page2" class="page">
        <div id="studentInfoBar" style="background:#F5EFE6; padding:10px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom:10px;"></div>
        <div id="secA" class="section"><h3>Part A 已選：<span id="curA">0</span> / <span id="maxA">0</span></h3><div id="calA" class="calendar-grid"></div></div>
        <div id="secB" class="section"><h3>Part B 已選：<span id="curB">0</span> / <span id="maxB">0</span></h3><div id="calB" class="calendar-grid"></div></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background:#BCAAA4; flex: 1;" onclick="goBack(1)">返回修改方案</button>
            <button class="btn" style="flex: 2;" onclick="submitAndGoToStep3()">確認報名並送出</button>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="section">
            <p>學生：<strong id="resName"></strong> | 級別：<strong id="resGrade"></strong></p>
            <div id="resSecAContainer"><h4>Part A 已選日期</h4><div id="resCalA" class="calendar-grid readonly-cal"></div></div>
            <div id="resSecBContainer" style="margin-top:10px;"><h4>Part B 已選日期</h4><div id="resCalB" class="calendar-grid readonly-cal"></div></div>
            <div class="result-box" style="margin-top:10px;">
                <p>總額：<strong>$<span id="resTotal"></span></strong> | 分期：<strong>$<span id="resInst"></span> x 6期</strong></p>
            </div>
        </div>
        <button class="btn no-print" onclick="triggerParentPrint()">列印報名表</button>
        <button class="btn no-print" style="background:#BCAAA4;" onclick="location.reload()">重新開始</button>
    </div>

    <div class="no-print" style="margin-top: 80px; text-align: center; opacity: 0.2;">
        <span id="adminToggle" onclick="toggleAdmin()" style="cursor:pointer;">⚙ 管理中心</span>
    </div>

    <div id="adminPanel">
        <div id="syncStatus" class="sync-loader" style="display:none;">☁ 正在同步 Google Sheets 數據...</div>
        <div class="stat-group" id="statContainer"></div>
        <div class="no-print" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn" style="background: #e67e22; width: auto;" onclick="showDailyModal()">📅 每日上課名單</button>
            <button class="btn" style="background: #4A6D8C; width: auto;" onclick="triggerAdminPrint()">🖨 列印統計</button>
            <button class="btn" style="background: #2e7d32; width: auto;" onclick="refreshFromSheets()">🔄 手動同步雲端</button>
        </div>
        <table class="admin-table" id="recordTable">
            <thead><tr><th>姓名</th><th>年級</th><th>性別</th><th>總額</th><th>A日數</th><th>B日數</th><th>Part C</th><th>登記時間</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="dailyListModal">
    <div class="modal-content">
        <div style="display:flex; justify-content: space-between; align-items:center; border-bottom:2px solid #333; padding-bottom:10px;">
            <h3>📅 每日上課名單統計 (星期一起始)</h3>
            <div class="no-print"><button class="btn" style="background:#0288D1; width:auto; margin:0;" onclick="triggerDailyPrint()">🖨 列印名單</button>
            <button class="btn" style="background:#795548; width:auto; margin:0;" onclick="document.getElementById('dailyListModal').style.display='none'">關閉</button></div>
        </div>
        <div id="dailyCalContent"></div>
    </div>
</div>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbytG9-GmPKQnHUazB0Lm6YyzE0plxtwrnz0BLUxL6xZ4FKE1qyon0AaMZ2qG3xuJ1oz/exec'; 

const PRICING = {
    secondary: { A: {12:2760, 16:3540, 19:4310}, B: {20:10080, 24:11760, 29:13440}, C_WithB: {20:3120, 24:3000, 29:2940}, C_Single: 3980 },
    primary: { A: {12:2520, 16:3240, 18:3780}, B: {20:8880, 24:10320, 29:12150}, C_WithB: {20:3060, 24:2790, 29:2640}, C_Single: 3250 }
};
const PART_C_DATES = { primary: "07/08/2026 - 09/08/2026", secondary: "14/08/2026 - 16/08/2026" };
const DATA_GROUP = { p1:"p1p3p6", p2:"p1p3p6", p3:"p1p3p6", p6:"p1p3p6", p4:"p4p5", p5:"p4p5", secondary:"secondary" };
const GRADE_ORDER = { "升小一":1, "升小二":2, "升小三":3, "升小四":4, "升小五":5, "升小六":6, "升中一或以上":7 };

let isDragging = false, selA = new Set(), selB = new Set(), cloudRecords = [];

function saveRecord() {
    const r = { 
        name: document.getElementById('stuName').value, 
        gender: document.getElementById('stuGender').value, 
        gradeText: document.getElementById('stuGrade').selectedOptions[0].text, 
        level: (document.getElementById('stuGrade').value === 'secondary') ? '中學' : '小學', 
        total: document.getElementById('estTotal').innerText, 
        countA: selA.size, countB: selB.size, 
        detailsA: Array.from(selA), detailsB: Array.from(selB), 
        hasPartC: document.getElementById('planC').checked, 
        timestamp: new Date().toLocaleString() 
    };
    fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
}

function refreshFromSheets() {
    document.getElementById('syncStatus').style.display = 'block';
    fetch(scriptURL)
    .then(res => res.json())
    .then(data => { cloudRecords = data; renderAdminTable(data); document.getElementById('syncStatus').style.display = 'none'; })
    .catch(err => { console.error("Sync Error:", err); document.getElementById('syncStatus').innerText = "❌ 同步失敗"; });
}

function renderAdminTable(records) {
    records.sort((a, b) => (GRADE_ORDER[a.gradeText] || 99) - (GRADE_ORDER[b.gradeText] || 99));
    const tbody = document.querySelector('#recordTable tbody');
    tbody.innerHTML = '';
    let totRev = 0, pBoy = 0, pGirl = 0, sBoy = 0, sGirl = 0;
    records.forEach(r => {
        totRev += Number(r.total);
        if(r.hasPartC) {
            if(r.gradeText.includes('小')) { if(r.gender === "男") pBoy++; else pGirl++; }
            else { if(r.gender === "男") sBoy++; else sGirl++; }
        }
        tbody.innerHTML += `<tr><td>${r.name}</td><td>${r.gradeText}</td><td>${r.gender}</td><td>$${r.total}</td><td>${r.countA}</td><td>${r.countB}</td><td>${r.hasPartC?'V':'×'}</td><td>${r.timestamp}</td></tr>`;
    });
    document.getElementById('statContainer').innerHTML = `<div class="stat-badge" style="background:#4A6D8C;">總人數: ${records.length}</div><div class="stat-badge" style="background:#16a085;">總額: $${totRev}</div><div class="stat-badge" style="background:#2980b9;">Part C 小男: ${pBoy}</div><div class="stat-badge" style="background:#c0392b;">Part C 小女: ${pGirl}</div><div class="stat-badge" style="background:#2c3e50;">Part C 中男: ${sBoy}</div><div class="stat-badge" style="background:#c0392b;">Part C 中女: ${sGirl}</div>`;
}

function toggleAdmin() { if (prompt("管理密碼：") === "8888") { document.getElementById('adminPanel').style.display = 'block'; refreshFromSheets(); } }

function showDailyModal() {
    document.getElementById('dailyListModal').style.display = 'block';
    const content = document.getElementById('dailyCalContent'); content.innerHTML = '正在從雲端生成名單...';
    
    setTimeout(() => {
        content.innerHTML = '';
        ["06", "07", "08"].forEach(m => {
            content.innerHTML += `<h4 style="margin-top:20px; border-left:5px solid #4A6D8C; padding-left:10px;">2026年 ${m}月</h4>`;
            const grid = document.createElement('div'); 
            grid.className = 'daily-cal-grid';
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = "repeat(5, 1fr)";
            grid.style.gap = "5px";
            
            // 獲取該月份的所有日期並按星期一排序
            let dates = new Set();
            Object.values(SCHEDULE_MASTER).forEach(g => g.A.concat(g.B).forEach(i => { if(i.d.startsWith(m)) dates.add(i.d); }));
            let sortedDates = Array.from(dates).sort((a,b) => a.localeCompare(b));
            
            sortedDates.forEach(dStr => {
                let listHtml = '';
                cloudRecords.forEach(r => {
                    let subText = "";
                    // 自動匹配該生所屬組別當天的科目
                    let groupKey = r.gradeText.includes("中") ? "secondary" : (["升小一","升小二","升小三","升小六"].some(x=>r.gradeText.includes(x)) ? "p1p3p6" : "p4p5");
                    let findA = SCHEDULE_MASTER[groupKey].A.find(x => x.d === dStr);
                    let findB = SCHEDULE_MASTER[groupKey].B.find(x => x.d === dStr);
                    
                    let isJoined = false;
                    if(r.detailsA && r.detailsA.includes(dStr)) { subText = findA ? findA.s : ""; isJoined = true; }
                    if(r.detailsB && r.detailsB.includes(dStr)) { subText = findB ? findB.s : ""; isJoined = true; }

                    if(isJoined) {
                        listHtml += `
                            <div class="student-name-tag">
                                ${r.name} (${r.gradeText})
                                <span class="tag-subject">📚 ${subText}</span>
                            </div>`;
                    }
                });
                grid.innerHTML += `<div style="border:1px solid #ddd; padding:5px; min-height:80px; background:#fff; font-size:11px;"><b>${dStr}</b><br>${listHtml}</div>`;
            });
            content.appendChild(grid);
        });
    }, 500);
}

// UI 基礎邏輯
function updateEstimates() {
    const g = document.getElementById('stuGrade').value;
    const optMaxA = document.getElementById('optMaxA');
    if (g === 'secondary') { optMaxA.value = "19"; optMaxA.text = "19 堂"; } else { optMaxA.value = "18"; optMaxA.text = "18 堂"; }
    const nA = Number(document.getElementById('planA').value), nB = Number(document.getElementById('planB').value), isC = document.getElementById('planC').checked;
    const p = PRICING[g==='secondary'?'secondary':'primary'];
    let fA = p.A[nA] || 0, fB = p.B[nB] || 0, fC = isC ? (nB>0 ? (p.C_WithB[nB] || p.C_Single) : p.C_Single) : 0;
    const total = fA + fB + fC;
    document.getElementById('estTotal').innerText = total;
    document.getElementById('estInstallment').innerText = Math.round(total / 6);
    document.getElementById('estDetail').innerText = `A: $${fA} | B: $${fB} | C: $${fC}`;
}

function goToStep2() {
    if (!document.getElementById('stuName').value) { alert("請輸入姓名"); return; }
    selA.clear(); selB.clear();
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
    const gVal = document.getElementById('stuGrade').value, nA = Number(document.getElementById('planA').value), nB = Number(document.getElementById('planB').value);
    document.getElementById('studentInfoBar').innerText = `學生：${document.getElementById('stuName').value} | 年級：${document.getElementById('stuGrade').selectedOptions[0].text}`;
    document.getElementById('secA').style.display = nA > 0 ? 'block' : 'none';
    document.getElementById('secB').style.display = nB > 0 ? 'block' : 'none';
    document.getElementById('maxA').innerText = nA; document.getElementById('maxB').innerText = nB;
    renderCal('calA', SCHEDULE_MASTER[DATA_GROUP[gVal]].A, selA, 'planA', 'curA');
    renderCal('calB', SCHEDULE_MASTER[DATA_GROUP[gVal]].B, selB, 'planB', 'curB');
}

function renderCal(id, data, set, pId, curId, readonly = false) {
    const container = document.getElementById(id), limit = Number(document.getElementById(pId).value);
    container.innerHTML = '';
    if (!readonly) document.getElementById(curId).innerText = set.size;
    data.forEach(item => {
        const d = document.createElement('div');
        d.className = 'day' + (item.ox ? ' oxford' : '') + (item.h ? ' holiday' : '');
        if (set.has(item.d)) d.classList.add('selected');
        d.innerHTML = `<span>${item.d}</span><strong>${item.s}</strong>`;
        if (!readonly && !item.h) {
            d.onclick = () => {
                if (set.has(item.d)) { set.delete(item.d); d.classList.remove('selected'); }
                else { if (set.size >= limit) { alert("已達上限"); return; } set.add(item.d); d.classList.add('selected'); }
                document.getElementById(curId).innerText = set.size;
            };
        }
        container.appendChild(d);
    });
}

function submitAndGoToStep3() {
    if (selA.size < Number(document.getElementById('planA').value) || selB.size < Number(document.getElementById('planB').value)) { alert("請選滿堂數"); return; }
    saveRecord();
    document.getElementById('resName').innerText = document.getElementById('stuName').value;
    document.getElementById('resGrade').innerText = document.getElementById('stuGrade').selectedOptions[0].text;
    document.getElementById('resTotal').innerText = document.getElementById('estTotal').innerText;
    document.getElementById('resInst').innerText = document.getElementById('estInstallment').innerText;
    const gVal = document.getElementById('stuGrade').value;
    if(selA.size > 0) renderCal('resCalA', SCHEDULE_MASTER[DATA_GROUP[gVal]].A, selA, 'planA', '', true);
    if(selB.size > 0) renderCal('resCalB', SCHEDULE_MASTER[DATA_GROUP[gVal]].B, selB, 'planB', '', true);
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page3').classList.add('active');
}

function triggerParentPrint() { document.body.className = 'print-mode-parent'; window.print(); }
function triggerAdminPrint() { document.body.className = 'print-mode-admin'; window.print(); }
function triggerDailyPrint() { document.body.className = 'print-mode-daily'; window.print(); }
function goBack(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page'+p).classList.add('active'); }

const SCHEDULE_MASTER = {
